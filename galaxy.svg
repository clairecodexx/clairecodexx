<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <style>

    /* --- étoiles fixes qui scintillent --- */
    @keyframes twinkle {
      0%,100% { opacity: 0.2; }
      50%      { opacity: 1; }
    }
    /* --- étoiles filantes --- */
    @keyframes shoot1 {
      0%   { transform: translate(0,0);      opacity: 0; }
      5%   { opacity: 1; }
      100% { transform: translate(260px, 120px); opacity: 0; }
    }
    @keyframes shoot2 {
      0%   { transform: translate(0,0);      opacity: 0; }
      5%   { opacity: 0.9; }
      100% { transform: translate(220px, 100px); opacity: 0; }
    }
    @keyframes shoot3 {
      0%   { transform: translate(0,0);      opacity: 0; }
      5%   { opacity: 0.85; }
      100% { transform: translate(200px, 90px); opacity: 0; }
    }
    /* --- particules / poussière qui dérivent --- */
    @keyframes drift1 {
      0%   { transform: translateY(0px);   opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-260px); opacity: 0; }
    }
    @keyframes drift2 {
      0%   { transform: translateY(0px);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-260px); opacity: 0; }
    }
    @keyframes drift3 {
      0%   { transform: translateY(0px);   opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-260px); opacity: 0; }
    }
    /* --- orbites qui tournent --- */
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinR {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    /* étoiles fixes */
    .t1  { animation: twinkle 2.1s ease-in-out infinite 0.0s; }
    .t2  { animation: twinkle 3.4s ease-in-out infinite 0.5s; }
    .t3  { animation: twinkle 1.8s ease-in-out infinite 1.1s; }
    .t4  { animation: twinkle 2.7s ease-in-out infinite 0.3s; }
    .t5  { animation: twinkle 3.0s ease-in-out infinite 1.6s; }
    .t6  { animation: twinkle 2.3s ease-in-out infinite 0.8s; }
    .t7  { animation: twinkle 1.6s ease-in-out infinite 2.0s; }
    .t8  { animation: twinkle 2.9s ease-in-out infinite 1.3s; }
    .t9  { animation: twinkle 3.5s ease-in-out infinite 0.2s; }
    .t10 { animation: twinkle 2.0s ease-in-out infinite 1.9s; }
    .t11 { animation: twinkle 2.5s ease-in-out infinite 0.7s; }
    .t12 { animation: twinkle 3.1s ease-in-out infinite 2.4s; }

    /* étoiles filantes */
    .s1 { animation: shoot1 3.5s ease-in infinite 0.0s; }
    .s2 { animation: shoot2 4.8s ease-in infinite 2.2s; }
    .s3 { animation: shoot3 3.9s ease-in infinite 5.1s; }
    .s4 { animation: shoot1 5.2s ease-in infinite 1.4s; }
    .s5 { animation: shoot2 4.1s ease-in infinite 3.8s; }

    /* particules montantes */
    .d1  { animation: drift1 5.0s ease-in infinite 0.0s; }
    .d2  { animation: drift2 6.5s ease-in infinite 0.9s; }
    .d3  { animation: drift3 4.5s ease-in infinite 1.8s; }
    .d4  { animation: drift1 5.8s ease-in infinite 2.6s; }
    .d5  { animation: drift2 4.2s ease-in infinite 3.4s; }
    .d6  { animation: drift3 6.0s ease-in infinite 0.5s; }
    .d7  { animation: drift1 5.3s ease-in infinite 4.1s; }
    .d8  { animation: drift2 4.8s ease-in infinite 1.3s; }
    .d9  { animation: drift3 5.6s ease-in infinite 2.9s; }
    .d10 { animation: drift1 4.0s ease-in infinite 3.7s; }
    .d11 { animation: drift2 6.3s ease-in infinite 0.2s; }
    .d12 { animation: drift3 5.1s ease-in infinite 4.8s; }

    /* orbites */
    .orb1 { animation: spin  12s linear infinite; transform-origin: 400px 150px; }
    .orb2 { animation: spinR 18s linear infinite; transform-origin: 400px 150px; }
    .orb3 { animation: spin  25s linear infinite; transform-origin: 400px 150px; }
  </style>

  <!-- ===================== ORBITES ===================== -->
  <!-- orbite 1 — lavande -->
  <ellipse class="orb1" cx="400" cy="150" rx="120" ry="40"
           fill="none" stroke="#c9b8f0" stroke-width="0.8" opacity="0.35"
           stroke-dasharray="6 5"/>
  <!-- point sur orbite 1 -->
  <circle class="orb1" cx="520" cy="150" r="3.5" fill="#c9b8f0" opacity="0.8"/>

  <!-- orbite 2 — rose -->
  <ellipse class="orb2" cx="400" cy="150" rx="190" ry="60"
           fill="none" stroke="#f4b8d0" stroke-width="0.8" opacity="0.3"
           stroke-dasharray="4 7"/>
  <!-- point sur orbite 2 -->
  <circle class="orb2" cx="590" cy="150" r="4" fill="#f4b8d0" opacity="0.85"/>

  <!-- orbite 3 — mint -->
  <ellipse class="orb3" cx="400" cy="150" rx="270" ry="85"
           fill="none" stroke="#a8e6cf" stroke-width="0.7" opacity="0.25"
           stroke-dasharray="3 8"/>
  <!-- point sur orbite 3 -->
  <circle class="orb3" cx="670" cy="150" r="3" fill="#a8e6cf" opacity="0.8"/>

  <!-- ===================== ÉTOILES FIXES ===================== -->
  <!-- Petites croix et ronds qui scintillent -->
  <!-- rose -->
  <circle class="t1"  cx="60"  cy="30"  r="2"   fill="#f9c6d8"/>
  <circle class="t2"  cx="150" cy="18"  r="1.5" fill="#c9b8f0"/>
  <circle class="t3"  cx="240" cy="45"  r="2.5" fill="#a8e6cf"/>
  <circle class="t4"  cx="310" cy="12"  r="1.5" fill="#f9c6d8"/>
  <circle class="t5"  cx="400" cy="28"  r="2"   fill="#c9b8f0"/>
  <circle class="t6"  cx="490" cy="15"  r="1.8" fill="#a8e6cf"/>
  <circle class="t7"  cx="570" cy="40"  r="2.2" fill="#f9c6d8"/>
  <circle class="t8"  cx="650" cy="20"  r="1.5" fill="#c9b8f0"/>
  <circle class="t9"  cx="730" cy="35"  r="2"   fill="#a8e6cf"/>
  <circle class="t10" cx="100" cy="80"  r="1.5" fill="#f9c6d8"/>
  <circle class="t11" cx="700" cy="75"  r="2"   fill="#c9b8f0"/>
  <circle class="t12" cx="450" cy="60"  r="1.8" fill="#a8e6cf"/>

  <!-- croix scintillantes -->
  <g class="t3">
    <line x1="350" y1="22" x2="350" y2="30" stroke="#f9c6d8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="346" y1="26" x2="354" y2="26" stroke="#f9c6d8" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g class="t6">
    <line x1="200" y1="60" x2="200" y2="68" stroke="#c9b8f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="196" y1="64" x2="204" y2="64" stroke="#c9b8f0" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g class="t9">
    <line x1="600" y1="55" x2="600" y2="63" stroke="#a8e6cf" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="596" y1="59" x2="604" y2="59" stroke="#a8e6cf" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g class="t1">
    <line x1="760" y1="50" x2="760" y2="60" stroke="#f9c6d8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="755" y1="55" x2="765" y2="55" stroke="#f9c6d8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="757" y1="51" x2="763" y2="59" stroke="#f9c6d8" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="763" y1="51" x2="757" y2="59" stroke="#f9c6d8" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <g class="t5">
    <line x1="30"  y1="85" x2="30"  y2="95" stroke="#c9b8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25"  y1="90" x2="35"  y2="90" stroke="#c9b8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="27"  y1="86" x2="33"  y2="94" stroke="#c9b8f0" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="33"  y1="86" x2="27"  y2="94" stroke="#c9b8f0" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- ===================== ÉTOILES FILANTES ===================== -->
  <!-- Chaque filante = ligne + petit cercle brillant à la tête -->
  <g class="s1">
    <line x1="50"  y1="20" x2="90"  y2="50" stroke="#f9c6d8" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <circle cx="50" cy="20" r="2.5" fill="#f9c6d8"/>
  </g>
  <g class="s2">
    <line x1="300" y1="10" x2="350" y2="45" stroke="#c9b8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="300" cy="10" r="3" fill="#c9b8f0"/>
  </g>
  <g class="s3">
    <line x1="520" y1="5"  x2="565" y2="38" stroke="#a8e6cf" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <circle cx="520" cy="5" r="2.5" fill="#a8e6cf"/>
  </g>
  <g class="s4">
    <line x1="680" y1="15" x2="720" y2="45" stroke="#f9c6d8" stroke-width="1" stroke-linecap="round" opacity="0.85"/>
    <circle cx="680" cy="15" r="2" fill="#f9c6d8"/>
  </g>
  <g class="s5">
    <line x1="150" y1="8"  x2="195" y2="38" stroke="#c9b8f0" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
    <circle cx="150" cy="8" r="2.8" fill="#c9b8f0"/>
  </g>

  <!-- ===================== PARTICULES MONTANTES ===================== -->
  <!-- roses -->
  <circle class="d1"  cx="80"  cy="285" r="2.5" fill="#f9c6d8"/>
  <circle class="d2"  cx="160" cy="288" r="1.5" fill="#c9b8f0"/>
  <circle class="d3"  cx="230" cy="282" r="3"   fill="#a8e6cf"/>
  <circle class="d4"  cx="310" cy="287" r="2"   fill="#f9c6d8"/>
  <circle class="d5"  cx="390" cy="284" r="1.8" fill="#c9b8f0"/>
  <circle class="d6"  cx="460" cy="289" r="2.5" fill="#a8e6cf"/>
  <circle class="d7"  cx="530" cy="283" r="1.5" fill="#f9c6d8"/>
  <circle class="d8"  cx="600" cy="287" r="3"   fill="#c9b8f0"/>
  <circle class="d9"  cx="670" cy="285" r="2"   fill="#a8e6cf"/>
  <circle class="d10" cx="730" cy="288" r="1.8" fill="#f9c6d8"/>
  <circle class="d11" cx="120" cy="286" r="2.2" fill="#c9b8f0"/>
  <circle class="d12" cx="760" cy="284" r="2.5" fill="#a8e6cf"/>

  <!-- losanges / diamants montants -->
  <g class="d3">
    <polygon points="270,285 274,281 278,285 274,289" fill="#f9c6d8" opacity="0.9"/>
  </g>
  <g class="d7">
    <polygon points="430,287 434,283 438,287 434,291" fill="#c9b8f0" opacity="0.9"/>
  </g>
  <g class="d11">
    <polygon points="695,286 699,282 703,286 699,290" fill="#a8e6cf" opacity="0.9"/>
  </g>

</svg>
