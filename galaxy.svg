<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:1} }
    @keyframes shoot1 { 0%{transform:translate(0,0);opacity:0} 6%{opacity:1} 100%{transform:translate(220px,95px);opacity:0} }
    @keyframes shoot2 { 0%{transform:translate(0,0);opacity:0} 6%{opacity:.9} 100%{transform:translate(200px,88px);opacity:0} }
    @keyframes shoot3 { 0%{transform:translate(0,0);opacity:0} 6%{opacity:.85} 100%{transform:translate(185px,80px);opacity:0} }
    @keyframes drift  { 0%{transform:translateY(0);opacity:0} 10%{opacity:.85} 90%{opacity:.65} 100%{transform:translateY(-270px);opacity:0} }
    @keyframes driftB { 0%{transform:translateY(0);opacity:0} 10%{opacity:.6}  90%{opacity:.4}  100%{transform:translateY(-270px);opacity:0} }

    .t1 {animation:twinkle 2.1s ease-in-out infinite 0.0s}
    .t2 {animation:twinkle 3.4s ease-in-out infinite 0.5s}
    .t3 {animation:twinkle 1.8s ease-in-out infinite 1.1s}
    .t4 {animation:twinkle 2.7s ease-in-out infinite 0.3s}
    .t5 {animation:twinkle 3.0s ease-in-out infinite 1.6s}
    .t6 {animation:twinkle 2.3s ease-in-out infinite 0.8s}
    .t7 {animation:twinkle 1.6s ease-in-out infinite 2.0s}
    .t8 {animation:twinkle 2.9s ease-in-out infinite 1.3s}
    .t9 {animation:twinkle 3.5s ease-in-out infinite 0.2s}
    .t10{animation:twinkle 2.0s ease-in-out infinite 1.9s}
    .t11{animation:twinkle 2.5s ease-in-out infinite 0.7s}
    .t12{animation:twinkle 3.1s ease-in-out infinite 2.4s}

    .s1{animation:shoot1 3.5s ease-in infinite 0.0s}
    .s2{animation:shoot2 4.8s ease-in infinite 2.2s}
    .s3{animation:shoot3 3.9s ease-in infinite 5.1s}
    .s4{animation:shoot1 5.2s ease-in infinite 1.4s}
    .s5{animation:shoot2 4.1s ease-in infinite 3.8s}

    .d1 {animation:drift  5.0s ease-in infinite 0.0s}
    .d2 {animation:driftB 6.5s ease-in infinite 0.9s}
    .d3 {animation:drift  4.5s ease-in infinite 1.8s}
    .d4 {animation:driftB 5.8s ease-in infinite 2.6s}
    .d5 {animation:drift  4.2s ease-in infinite 3.4s}
    .d6 {animation:driftB 6.0s ease-in infinite 0.5s}
    .d7 {animation:drift  5.3s ease-in infinite 4.1s}
    .d8 {animation:driftB 4.8s ease-in infinite 1.3s}
    .d9 {animation:drift  5.6s ease-in infinite 2.9s}
    .d10{animation:drift  4.0s ease-in infinite 3.7s}
    .d11{animation:driftB 6.3s ease-in infinite 0.2s}
    .d12{animation:drift  5.1s ease-in infinite 4.8s}
  </style>

  <!-- étoiles fixes -->
  <circle class="t1"  cx="30"  cy="20"  r="1.8" fill="#f9c6d8"/>
  <circle class="t2"  cx="95"  cy="12"  r="1.4" fill="#c9b8f0"/>
  <circle class="t3"  cx="170" cy="30"  r="2.2" fill="#a8e6cf"/>
  <circle class="t4"  cx="250" cy="10"  r="1.5" fill="#f9c6d8"/>
  <circle class="t5"  cx="340" cy="22"  r="1.8" fill="#c9b8f0"/>
  <circle class="t6"  cx="420" cy="8"   r="1.5" fill="#a8e6cf"/>
  <circle class="t7"  cx="490" cy="35"  r="2.0" fill="#f9c6d8"/>
  <circle class="t8"  cx="570" cy="15"  r="1.6" fill="#c9b8f0"/>
  <circle class="t9"  cx="650" cy="40"  r="1.8" fill="#a8e6cf"/>
  <circle class="t10" cx="75"  cy="65"  r="1.4" fill="#f9c6d8"/>
  <circle class="t11" cx="600" cy="60"  r="1.8" fill="#c9b8f0"/>
  <circle class="t12" cx="730" cy="25"  r="1.5" fill="#a8e6cf"/>

  <!-- croix scintillantes -->
  <g class="t3">
    <line x1="290" y1="16" x2="290" y2="24" stroke="#f9c6d8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="286" y1="20" x2="294" y2="20" stroke="#f9c6d8" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g class="t7">
    <line x1="540" y1="22" x2="540" y2="30" stroke="#c9b8f0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="536" y1="26" x2="544" y2="26" stroke="#c9b8f0" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g class="t1">
    <line x1="640" y1="50" x2="640" y2="62" stroke="#a8e6cf" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="634" y1="56" x2="646" y2="56" stroke="#a8e6cf" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="636" y1="52" x2="644" y2="60" stroke="#a8e6cf" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="644" y1="52" x2="636" y2="60" stroke="#a8e6cf" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <g class="t9">
    <line x1="40"  y1="80" x2="40"  y2="92" stroke="#f9c6d8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="34"  y1="86" x2="46"  y2="86" stroke="#f9c6d8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36"  y1="82" x2="44"  y2="90" stroke="#f9c6d8" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="44"  y1="82" x2="36"  y2="90" stroke="#f9c6d8" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <g class="t5">
    <line x1="380" y1="45" x2="380" y2="55" stroke="#c9b8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="375" y1="50" x2="385" y2="50" stroke="#c9b8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="377" y1="47" x2="383" y2="53" stroke="#c9b8f0" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="383" y1="47" x2="377" y2="53" stroke="#c9b8f0" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- étoiles filantes -->
  <g class="s1">
    <line x1="45"  y1="15" x2="85"  y2="45" stroke="#f9c6d8" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <circle cx="45" cy="15" r="2.5" fill="#f9c6d8"/>
  </g>
  <g class="s2">
    <line x1="230" y1="8"  x2="275" y2="38" stroke="#c9b8f0" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="230" cy="8"  r="3"   fill="#c9b8f0"/>
  </g>
  <g class="s3">
    <line x1="480" y1="5"  x2="520" y2="32" stroke="#a8e6cf" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
    <circle cx="480" cy="5"  r="2.5" fill="#a8e6cf"/>
  </g>
  <g class="s4">
    <line x1="610" y1="12" x2="648" y2="38" stroke="#f9c6d8" stroke-width="1.0" stroke-linecap="round" opacity="0.85"/>
    <circle cx="610" cy="12" r="2"   fill="#f9c6d8"/>
  </g>
  <g class="s5">
    <line x1="115" y1="6"  x2="155" y2="34" stroke="#c9b8f0" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
    <circle cx="115" cy="6"  r="2.8" fill="#c9b8f0"/>
  </g>

  <!-- particules montantes -->
  <circle class="d1"  cx="55"  cy="288" r="2.2" fill="#f9c6d8"/>
  <circle class="d2"  cx="120" cy="291" r="1.5" fill="#c9b8f0"/>
  <circle class="d3"  cx="190" cy="286" r="2.8" fill="#a8e6cf"/>
  <circle class="d4"  cx="265" cy="290" r="1.8" fill="#f9c6d8"/>
  <circle class="d5"  cx="340" cy="288" r="1.5" fill="#c9b8f0"/>
  <circle class="d6"  cx="415" cy="291" r="2.2" fill="#a8e6cf"/>
  <circle class="d7"  cx="480" cy="287" r="1.5" fill="#f9c6d8"/>
  <circle class="d8"  cx="545" cy="290" r="2.5" fill="#c9b8f0"/>
  <circle class="d9"  cx="610" cy="288" r="1.8" fill="#a8e6cf"/>
  <circle class="d10" cx="670" cy="291" r="1.5" fill="#f9c6d8"/>
  <circle class="d11" cx="85"  cy="289" r="2.0" fill="#c9b8f0"/>
  <circle class="d12" cx="310" cy="292" r="1.8" fill="#a8e6cf"/>

  <!-- losanges montants -->
  <g class="d3"><polygon points="155,287 159,283 163,287 159,291" fill="#f9c6d8" opacity="0.9"/></g>
  <g class="d7"><polygon points="445,289 449,285 453,289 449,293" fill="#c9b8f0" opacity="0.9"/></g>
  <g class="d11"><polygon points="580,288 584,284 588,288 584,292" fill="#a8e6cf" opacity="0.9"/></g>
</svg>
